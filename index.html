<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Login UI</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial;
}

body{
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background:#0F172A;
color:white;
}

/* CARD */

.container{
position:relative;
width:850px;
height:450px;
background:#1E293B;
border-radius:12px;
overflow:hidden;
display:flex;
}

/* LOGIN SIDE */

.form-panel{
width:50%;
padding:60px;
display:flex;
flex-direction:column;
justify-content:center;
z-index:2;
}

h2{
margin-bottom:30px;
}

/* INPUT */

.input-box{
position:relative;
margin-bottom:30px;
}

.input-box input{
width:100%;
background:none;
border:none;
border-bottom:2px solid #7C3AED;
outline:none;
padding:10px 5px;
color:white;
font-size:16px;
}

/* FLOAT LABEL */

.input-box label{
position:absolute;
left:5px;
top:50%;
transform:translateY(-50%);
color:#aaa;
pointer-events:none;
transition:.3s;
}

.input-box input:focus ~ label,
.input-box input:valid ~ label{
top:-8px;
font-size:12px;
color:#7C3AED;
}

/* BUTTON */

button{
padding:10px;
border:none;
background:#7C3AED;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
font-weight: bold;
}
Button:hover {
  background-color:#6A36C4;
}
.Butten-panel{
padding:10px;
font-weight: bold;
border:none;
background:#7C3AED;
color:white;
border-radius:6px;
cursor:pointer;
margin-top:10px;
transition: background-color 0.3s;
}

.Butten-panel:hover {
  background-color:#6A36C4;
}
/* LINK */

.switch{
margin-top: 1.5rem;
  color: rgb(156 163 175 / var(--tw-text-opacity, 1));
  text-align: center;
  --tw-text-opacity: 1;
  font-size: 12px;
}

.Link{
--tw-text-opacity: 1;
  color: rgb(168 85 247 / var(--tw-text-opacity, 1));
}
.Link:hover{
text-decoration: underline;
}
/* RIGHT SIDE PANEL */

.info-panel{
position:absolute;
right:0;
width:50%;
height:100%;
background:linear-gradient(135deg,#7C3AED,#4C1D95);
clip-path:polygon(20% 0,100% 0,100% 100%,0% 100%);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:40px;
}

.info-panel h2{
font-size:32px;
margin-bottom:10px;
}

.info-panel p{
max-width:250px;
opacity:0.9;
}

</style>
</head>

<body>

<div class="container">

<!-- LOGIN FORM -->

<div class="form-panel">

<h2>Login</h2>

<div class="input-box">
<input type="text" required>
<label>Username</label>
</div>

<div class="input-box">
<input type="password" required>
<label>Password</label>
</div>

<button>Login</button>

<p class="switch">
Forgot your password?<a href="#" style="  text-decoration: none;"><span class="Link">
Reset it
</span><a/></p>


</div>

<!-- RIGHT DIAGONAL PANEL -->

<div class="info-panel">

<h2>WELCOME BACK!</h2>

<p>
Create your account and start your journey with us.
</p>
<a style="text-decoration: none;
  color: #fff;" href="file:///home/digihub/Music/s/login_signup2.html"><button class="Butten-panel">Sign Up</button></a>
</div>

</div>

</body>
</html>
